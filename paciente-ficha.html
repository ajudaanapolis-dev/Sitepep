<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha do paciente — Clínica PEP</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
<template id="page-content">
<div class="border-b bg-white px-6 py-5"><div class="flex items-start justify-between gap-4"><div><h1 class="text-3xl font-bold text-slate-900">Henrique Gabriel Santos Dias</h1><p class="mt-0.5 text-sm text-slate-400">Pacientes / Ficha</p></div></div></div>
<div class="space-y-6 p-6">
  <div class="rounded-xl border bg-white p-6 shadow-sm">
    <p class="text-sm text-slate-600">CPF 529.982.247-25 · Nascimento 14/03/1988 · Particular</p>
    <div class="mt-4 space-y-2">
      <div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"><strong>Alergias:</strong> Dipirona</div>
      <div class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800"><strong>Medicamentos em uso:</strong> Losartana 50mg</div>
    </div>
  </div>
  <div class="flex gap-1 rounded-lg bg-slate-100 p-1 text-sm">
    <button onclick="aba('d')" id="t-d" class="rounded-md bg-white px-4 py-2 font-medium shadow-sm">Dados</button>
    <button onclick="aba('h')" id="t-h" class="rounded-md px-4 py-2 text-slate-600">Histórico</button>
    <button onclick="aba('o')" id="t-o" class="rounded-md px-4 py-2 text-slate-600">Documentos</button>
  </div>
  <div id="p-d" class="rounded-xl border bg-white p-6 text-sm text-slate-600 shadow-sm">Formulário com dados cadastrais do paciente (editável).</div>
  <div id="p-h" class="hidden rounded-xl border bg-white p-6 shadow-sm"><table class="w-full text-sm"><thead><tr class="border-b text-left text-slate-500"><th class="py-2">Data</th><th>Profissional</th><th>Status</th></tr></thead><tbody><tr class="border-b"><td class="py-2">08/06/2026 08:00</td><td>Dra. Mariana Alves</td><td>Finalizada</td></tr></tbody></table></div>
  <div id="p-o" class="hidden space-y-4">
    <div class="rounded-xl border bg-white p-6 shadow-sm"><h3 class="font-bold text-slate-800">Prescrições</h3><div class="mt-3 flex items-center justify-between rounded-lg border px-3 py-2 text-sm"><span>Receituário de 08/06/2026</span><a href="imprimir-prescricao.html" target="_blank" class="text-emerald-700 underline">Imprimir</a></div></div>
    <div class="rounded-xl border bg-white p-6 shadow-sm"><h3 class="font-bold text-slate-800">Atestados</h3><div class="mt-3 flex items-center justify-between rounded-lg border px-3 py-2 text-sm"><span>Atestado de 08/06/2026</span><a href="imprimir-documento.html" target="_blank" class="text-emerald-700 underline">Imprimir</a></div></div>
  </div>
  <a href="atendimento.html" class="inline-block rounded-lg bg-emerald-500 px-5 py-3 text-sm font-medium text-white hover:bg-emerald-600">Abrir atendimento →</a>
</div>
<script>function aba(n){['d','h','o'].forEach(x=>{document.getElementById('p-'+x).classList.toggle('hidden',x!==n);var t=document.getElementById('t-'+x);if(x===n){t.className='rounded-md bg-white px-4 py-2 font-medium shadow-sm';}else{t.className='rounded-md px-4 py-2 text-slate-600';}});}</script></template>
<script src="app.js"></script>
<script>renderShell("pacientes.html");</script>
</body>
</html>
