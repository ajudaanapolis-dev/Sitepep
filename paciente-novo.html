<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo paciente — Clínica PEP</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
<template id="page-content">
<div class="border-b bg-white px-6 py-5"><div class="flex items-start justify-between gap-4"><div><h1 class="text-3xl font-bold text-slate-900">Novo paciente</h1><p class="mt-0.5 text-sm text-slate-400">Pacientes</p></div></div></div>
<form class="max-w-4xl space-y-6 p-6" onsubmit="event.preventDefault();window.location.href='paciente-ficha.html'">
  <fieldset class="rounded-xl border bg-white p-6 shadow-sm"><legend class="px-2 text-sm font-bold text-slate-700">Dados pessoais</legend>
    <div class="grid gap-4 md:grid-cols-2"><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">Nome completo *</label><input placeholder="" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">CPF *</label><input placeholder="000.000.000-00" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">Data de nascimento *</label><input placeholder="" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">Telefone *</label><input placeholder="(00) 00000-0000" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">E-mail</label><input placeholder="" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">Convênio</label><input placeholder="Particular" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div></div></fieldset>
  <fieldset class="rounded-xl border bg-white p-6 shadow-sm"><legend class="px-2 text-sm font-bold text-slate-700">Endereço</legend>
    <div class="grid gap-4 md:grid-cols-3"><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">Logradouro *</label><input placeholder="" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">Número *</label><input placeholder="" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">Bairro *</label><input placeholder="" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">Cidade *</label><input placeholder="" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">UF *</label><input placeholder="GO" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div><div class="space-y-1.5"><label class="text-sm font-medium text-slate-600">CEP *</label><input placeholder="00000-000" class="h-11 w-full rounded-lg border border-slate-200 px-3 text-sm"></div></div></fieldset>
  <div class="rounded-xl border bg-white p-6 shadow-sm"><label class="flex items-start gap-3 text-sm text-slate-700"><input type="checkbox" class="mt-1 h-4 w-4 accent-emerald-600"><span><strong>Consentimento LGPD *</strong> — Autorizo o tratamento dos dados pessoais e de saúde conforme a Lei 13.709/2018.</span></label></div>
  <button class="rounded-lg bg-emerald-500 px-5 py-3 text-sm font-medium text-white hover:bg-emerald-600">Cadastrar paciente</button>
</form></template>
<script src="app.js"></script>
<script>renderShell("pacientes.html");</script>
</body>
</html>
